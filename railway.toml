[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"
watchPatterns = [
  "/backend/**",
  "/docker-compose.yml",
  "/railway.toml",
  "/.dockerignore",
]

[deploy]
healthcheckPath = "/up"
healthcheckTimeout = 180
preDeployCommand = ["php artisan migrate --force"]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

