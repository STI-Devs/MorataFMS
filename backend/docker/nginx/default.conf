limit_req_zone $binary_remote_addr zone=csrf_per_ip:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=login_per_ip:10m rate=10r/m;

server {
    listen ${PORT};
    listen [::]:${PORT};
    server_name _;
    server_tokens off;

    root /var/www/html/public;
    index index.php index.html;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    client_max_body_size 64m;

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location = /sanctum/csrf-cookie {
        limit_except GET {
            deny all;
        }

        limit_req zone=csrf_per_ip burst=5 nodelay;
        limit_req_status 429;

        try_files $uri /index.php?$query_string;
    }

    location = /api/auth/login {
        limit_req zone=login_per_ip burst=5 nodelay;
        limit_req_status 429;

        try_files $uri /index.php?$query_string;
    }

    location = / {
        limit_except GET {
            deny all;
        }

        try_files $uri /index.php?$query_string;
    }

    location /api/ {
        try_files $uri /index.php?$query_string;
    }

    location = /up {
        limit_except GET {
            deny all;
        }

        try_files $uri /index.php?$query_string;
    }

    location = /docs/api {
        limit_except GET {
            deny all;
        }

        try_files $uri /index.php?$query_string;
    }

    location = /docs/api.json {
        limit_except GET {
            deny all;
        }

        try_files $uri /index.php?$query_string;
    }

    location = /index.php {
        internal;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param SERVER_SOFTWARE nginx;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_read_timeout 120;
    }

    location ~* ^/(?:api/)?(?:actuator|_profiler|server-status)(?:/|$) {
        return 404;
    }

    location ~* \.(?:bak|sql|pem|key|log|ini)$ {
        return 404;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location / {
        return 404;
    }
}
