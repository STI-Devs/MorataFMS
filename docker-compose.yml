services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: morata_fms
      MYSQL_USER: morata
      MYSQL_PASSWORD: morata
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - path: ./backend/.env.docker.example
        required: true
      - path: ./backend/.env.docker
        required: false
    environment:
      PORT: "8000"
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent http://127.0.0.1:8000/up || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/host/backend:ro

  frontend:
    image: node:22-bookworm
    profiles:
      - frontend
    working_dir: /app
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_TRANSACTION_SYNC_ENABLED: "false"
    command:
      - /bin/sh
      - -lc
      - corepack enable && pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  mysql_data:
  frontend_node_modules:
